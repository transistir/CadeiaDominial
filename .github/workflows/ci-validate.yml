name: CI Validate

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  install-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm + Node
        uses: ./.github/actions/setup-pnpm-node
      - name: Clean install and build
        run: bash scripts/ci-validate.sh

  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm + Node
        uses: ./.github/actions/setup-pnpm-node
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run lint
        run: pnpm lint
      - name: Run typecheck
        run: pnpm typecheck

  test-unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm + Node
        uses: ./.github/actions/setup-pnpm-node
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run unit tests
        run: pnpm test:unit

  test-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm + Node
        uses: ./.github/actions/setup-pnpm-node
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps
      - name: Run e2e tests
        run: pnpm test:e2e
