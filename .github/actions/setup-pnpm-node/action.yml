name: 'Setup pnpm + Node'
description: >-
  Setup pnpm (version auto-resolved from root `packageManager` field) and
  Node 20 with the pnpm cache. Use this in CI jobs that need a pnpm
  workspace — avoids duplicating the 2-step block in every job.

runs:
  using: 'composite'
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      # No `version:` — pnpm/action-setup@v4 reads from root
      # `packageManager` field (pnpm@10.28.2). Hardcoding `version: 9` here
      # caused ERR_PNPM_BAD_PM_VERSION in earlier CI runs (see PR #27).
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: pnpm
