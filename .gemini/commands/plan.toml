description = "Execute ADD plan phase - create step-by-step implementation plan"
prompt = """
# ADD Plan Phase

Your task is to generate an implementation plan for the current issue.

## 1. Prerequisites Check
Find the most recent issue directory in `.project/issues/`.
Verify that `03-tests.md` exists.

## 2. Load Artifacts
Read these files from `.project/issues/ISSUE-[id]/`:
- `00-context.md`
- `02-spec.md`
- `03-tests.md`

## 3. Generate Plan
Create a detailed step-by-step implementation plan that:
1. Implements all acceptance criteria from the spec.
2. Ensures all tests will pass.
3. Specifies exact files to change.
4. Provides atomic, verifiable steps.

Format the plan as markdown with sections:
- Alignment Check
- Steps (with file paths, changes, verification)
- Files Changed Summary
- Verification Checklist

## 4. Save Plan
Write your response to `.project/issues/ISSUE-[id]/04-plan.md`.

## 5. Report
Inform the user that the plan has been saved and instruct them to review it.
"""
